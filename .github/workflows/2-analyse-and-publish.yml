name: 2 Analysis and rendering (geodienste.ch)

on:
  schedule:
  - cron:  '0 2 * * MON'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Update
        run: sudo apt-get update
        
      - name: Install libcurl
        run: sudo apt-get install -y libcurl4-openssl-dev
        
      - name: Install libudunits2 (for {units} in R)
        run: sudo apt-get install libudunits2-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'
          use-public-rspm: true

      - name: Switch R to reference BLAS
        # The GitHub runner has been starting R with OpenBLAS. Quarto's
        # issue tracker points to OpenBLAS/native-library conflicts as a
        # cause of otherwise opaque segfaults in R subprocesses.
        run: |
          ARCH=$(uname -m)
          sudo apt-get install -y libblas-dev liblapack-dev
          sudo update-alternatives --set "libblas.so.3-${ARCH}-linux-gnu" "/usr/lib/${ARCH}-linux-gnu/blas/libblas.so.3"
          sudo update-alternatives --set "liblapack.so.3-${ARCH}-linux-gnu" "/usr/lib/${ARCH}-linux-gnu/lapack/liblapack.so.3"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: r-${{ runner.os }}-4.5.3-refblas-renv-v14-${{ hashFiles('renv.lock') }}
          restore-keys: |
            r-${{ runner.os }}-4.5.3-refblas-renv-v14-

      - name: Bootstrap renv
        run: |
          cat("renv ", as.character(utils::packageVersion("renv")), "\n", sep = "")
        shell: Rscript {0}

      - name: Install R package dependencies from renv.lock
        # renv.lock is an renv-format lockfile. Restore it with renv;
        # pak::lockfile_install() expects pak's own lockfile schema.
        # Keep renv's global cache out of CI so native packages are restored
        # into the project library for this runner.
        env:
          RENV_CONFIG_CACHE_ENABLED: "FALSE"
        run: |
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/noble/latest"))
          renv::restore(lockfile = "renv.lock", prompt = FALSE)
          status <- renv::status()
          if (!isTRUE(status$synchronized)) {
            stop("renv restore did not synchronize the project with renv.lock", call. = FALSE)
          }
        shell: Rscript {0}

      - name: Diagnostics (sessionInfo + Quarto CLI)
        run: |
          Rscript -e 'cat(R.version.string, "\n"); print(sessionInfo()); cat("Quarto: ", system("quarto --version", intern = TRUE), "\n")'

      - name: Build {targets} pipeline (data + Quarto report)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this secret is always available for github actions
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
        run: Rscript -e 'targets::tar_make()'

      - name: Push contents of _site folder to repo
        uses: github-actions-x/commit@v2.9
        with:
          push-branch: 'main'
          commit-message: 'Render'
          force-add: 'true'
          files: _site/ 
          name: autoupdate
      
