name: 2 Analysis and rendering (geodienste.ch)

on:
  schedule:
  - cron:  '0 2 * * MON'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Update
        run: sudo apt-get update
        
      - name: Install libcurl
        run: sudo apt-get install -y libcurl4-openssl-dev
        
      - name: Install libudunits2 (for {units} in R)
        run: sudo apt-get install libudunits2-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
        
      - name: Install libraries
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 5

      - name: Build {targets} pipeline (data + Quarto report)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this secret is always available for github actions
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
        run: Rscript -e 'targets::tar_make()'

      - name: Push contents of _site folder to repo
        uses: github-actions-x/commit@v2.9
        with:
          push-branch: 'main'
          commit-message: 'Render'
          force-add: 'true'
          files: _site/ 
          name: autoupdate
      
